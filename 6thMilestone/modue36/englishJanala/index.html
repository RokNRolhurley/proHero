<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>English Janala</title>
</head>
<body>

    <header>
         <nav class=" w-11/12 mx-auto py-3 flex justify-between border-b">
                <div class="logo w-[100px]">
                    <img src="./img/logo.png" alt="" >
                </div>
                 
                <div class="search">
                   <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"2
                            fill="none"
                            stroke="currentColor"
                            >
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" class="grow" placeholder="Search" />

                        <kbd class="kbd kbd-sm">K</kbd>
                     </label>
                </div>

                <div class="flex flex-row justify-between ">
                    <div class="faq">
                        <button class="btn">FAQ</button>
                    </div>
                    <div class="learn">
                        <button class="btn">Learn</button>
                    </div>
                    <div class="logout">
                        <button class="btn">Logout</button>
                    </div>
                </div>
            </nav>
    </header>

    <main>
        <section class=" w-11/12 mx-auto">
            <div class="flex flex-row gap-3 ">
                <div id="easy" class="flex flex-col text-align-center justify-center m-2"  >
                    
                    <div id="easyText">
                        <h1 class="font-bold " style="font-size: xx-large;">English is Easy</h1>
                        <p>Start your course today, take part in the class regularly, complete your tasks. Become the best</p>
                    </div>
                    <div id="easyName" class="flex flex-col m-2">
                        <div>
                            <input type="text" placeholder="Enter Your Name" class="gap-1">
                        </div>
                        <div>
                            <input type="text" placeholder="Your Login Code (4567)">
                        </div>
                    </div>
                    <div>
                        <button type="submit" class="border-s-orange-400 ">Submit</button>
                    </div>

                </div>
                <div id="easyImg">
                    <img src="./img/hero-student.png" alt="" srcset="">
                </div>
            </div>
        </section>

        <section class=" w-11/12 mx-auto text-center">
            <div>
                <div>
                    <div>
                        <h1 class="">Let's Learn Vocabularies</h1>
                    </div>
                    <div id="lessonsContainer" class="flex flex-row gap-2 text-center p-2 ">

                    </div>
                    
                </div>
            </div>
        </section>

    </main>

  <script src="./api/api.js"></script>  
  <script src="./style/style.css"></script>
</body>
</html>
